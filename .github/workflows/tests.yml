name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Fast smoke verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Compile source and tests
        run: python -m compileall -q agent_os tests

      - name: Run local CLI smoke checks
        env:
          CLANKEROS_CI_ROOT: ${{ runner.temp }}/clankeros-ci-root
        run: |
          python -m agent_os.cli --root "$CLANKEROS_CI_ROOT" init
          python -m agent_os.cli --root "$CLANKEROS_CI_ROOT" app-smoke-test
          python -m agent_os.cli --root "$CLANKEROS_CI_ROOT" demo-app-scenario
          python -m agent_os.cli --root "$CLANKEROS_CI_ROOT" app-demo-smoke-test
          python -m agent_os.cli --root "$CLANKEROS_CI_ROOT" app --help
          python -m agent_os.cli --root "$CLANKEROS_CI_ROOT" dashboard
          python -m agent_os.cli --root "$CLANKEROS_CI_ROOT" iterate

      - name: Run focused local app pytest smoke
        run: |
          python -m pytest tests/test_first_milestone.py -q -k "github_actions_workflow_runs_automatic_verification or github_actions_smoke_uses_temp_root_and_expected_order or ci_snapshot_evidence_from_gh_json_validates_successful_matching_run or ci_snapshot_evidence_from_gh_json_records_completed_job_while_run_in_progress or ci_snapshot_evidence_from_gh_json_rejects_pending_or_wrong_commit or local_app_records_ci_snapshot_evidence_from_pasted_gh_json or local_app_records_fast_smoke_ci_snapshot_evidence_from_pasted_gh_json or local_app_rejects_pending_ci_snapshot_status_json_without_record or ci_snapshot_handoff_prints_watch_and_record_commands_without_writes or local_app_routes_render_modern_workflow_and_health or local_app_runs_delegation_from_browser_action or local_app_artifact_viewer_is_read_only_and_bounded or local_app_demo_scenario_populates_fixture_state or local_app_cli_commands_and_bind_safety"

      - name: Check whitespace
        run: git diff --check

  full-suite:
    name: Full pytest suite
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run full test suite
        run: python -m pytest -q
